name: Java CI với Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Kéo mã nguồn từ repo về máy ảo của GitHub Actions
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Java JDK 17 để chạy dự án
    - name: Thiết lập JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Bước 3: Di chuyển vào thư mục Java và tiến hành chạy lệnh biên dịch + quét Unit Test tự động
    - name: Chạy Biên Dịch và Kiểm Thử Tự Động
      run: |
        cd JavaMaven-*
        mvn clean test